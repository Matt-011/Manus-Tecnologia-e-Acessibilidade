    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
        }

        /* ÁREA CENTRAL (CORRIGIDA) */
        .container-custom {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* evita bug com muitos cards */
            padding: 40px 0;
        }

        /* GRID */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 900px;
        }

        /* CARD */
        .card-box {
            background: linear-gradient(135deg, #007BFF, #00A6FF);
            color: white;
            text-decoration: none;
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        /* ÍCONE */
        .card-box i {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
            color: white;
        }

        /* HOVER */
        .card-box:hover {
            transform: translateY(-5px) scale(1.05);
            background: linear-gradient(135deg, #0056b3, #0088cc);
        }

        /* CELULAR */
        @media (max-width: 576px) {
            .container-custom {
                padding: 30px 0;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card-box {
                padding: 30px 15px;
                font-size: 16px;
            }

            .card-box i {
                font-size: 24px;
            }
        }

        /* TABLET */
        @media (min-width: 577px) and (max-width: 991px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* PC */
        @media (min-width: 992px) {
            .cards {
                grid-template-columns: repeat(4, 1fr);
            }
        }
    </style>

</head>
