    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
        }

        /* Área central */
        .container-custom {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Grid das caixas */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 700px;
        }

        /* Caixinhas */
        .card-box {
            background: linear-gradient(135deg, #007BFF, #00A6FF);
            color: rgb(255, 255, 255);
            text-decoration: none;
            padding: 40px 20px;
            text-align: center;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 500;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        /* Ícone */
        .card-box i {
            font-size: 30px;
            margin-bottom: 10px;
            display: block;
            color: rgb(255, 255, 255);
        }

        /* Hover */
        .card-box:hover {
            transform: translateY(-5px) scale(1.05);
            background: linear-gradient(135deg, #0056b3, #0088cc);
        }

        /* CELULAR */
        @media (max-width: 576px) {
            .container-custom {
                height: auto;
                padding: 40px 0;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card-box {
                padding: 30px 15px;
                font-size: 16px;
            }

            .card-box i {
                font-size: 24px;
            }
        }


        /* TABLET */
        @media (min-width: 577px) and (max-width: 991px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }

            .card-box {
                padding: 35px 20px;
                font-size: 17px;
            }
        }

        /* COMPUTADOR */
        @media (min-width: 992px) {
            .cards {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>

</head>
